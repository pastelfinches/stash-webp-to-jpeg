name: WEBP to JPEG Cover Converter
description: Finds scene covers stored as WEBP and re-encodes them as JPEG in-place, preserving the original scraped artwork. Useful for clients like HereSphere that do not render WEBP.
version: 0.4.0
url: https://github.com/pastelfinches/stash-plugins
# requires: PythonDepManager

exec:
  - python
  - "{pluginDir}/webp_to_jpeg.py"

interface: raw

errLog: info

tasks:
  - name: Convert WEBP Covers to JPEG
    description: Scan all scenes, detect WEBP covers, and convert them to JPEG. Enable "Dry Run" in plugin settings to preview without making changes.
    defaultArgs:
      mode: convert

hooks:
  - name: Auto-convert on Scene Update
    description: Automatically convert newly-set WEBP covers to JPEG when a scene is updated with a new cover image (e.g., after scraping).
    triggeredBy:
      - Scene.Update.Post
    defaultArgs:
      mode: hook
  - name: Auto-convert on Scene Create
    description: Automatically convert WEBP covers to JPEG when a new scene is created with a cover image.
    triggeredBy:
      - Scene.Create.Post
    defaultArgs:
      mode: hook

settings:
  dryRun:
    displayName: Dry Run
    description: Report WEBP covers without modifying anything.
    type: BOOLEAN
  jpegQuality:
    displayName: JPEG Quality (1-100, leave 0 for default)
    description: JPEG encoding quality. Leave at 0 or unset to use the default (92). Higher = larger files, better quality.
    type: NUMBER
  workers:
    displayName: Worker threads (leave 0 for default)
    description: How many scenes to process in parallel. Leave at 0 or unset to use the default (8). Lower to reduce CPU/memory load on Stash; raise if conversion is I/O-bound on a fast box.
    type: NUMBER
