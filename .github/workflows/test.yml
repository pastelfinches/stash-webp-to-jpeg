name: Tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: Lint and type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements-test.txt
      - run: pip install -r tests/requirements-test.txt
      - name: Ruff
        run: ruff check plugins/ tests/
      - name: Pyright
        run: pyright plugins/ tests/

  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements-test.txt
      - run: pip install -r tests/requirements-test.txt
      - run: pytest tests/test_webp_to_jpeg_unit.py -v

  integration:
    name: Integration tests (ephemeral Stash)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: tests/requirements-test.txt
      - run: pip install -r tests/requirements-test.txt
      - name: Install ffmpeg (to generate sample.mp4)
        run: sudo apt-get update && sudo apt-get install -y ffmpeg
      - name: Generate sample media
        run: |
          mkdir -p tests/sandbox/media
          ffmpeg -y -f lavfi -i color=c=black:s=64x64:d=1:r=10 \
            -c:v libx264 -pix_fmt yuv420p -preset ultrafast \
            -movflags +faststart tests/sandbox/media/sample.mp4
      - run: pytest tests/integration -v
      - name: Sandbox logs on failure
        if: failure()
        run: docker compose -f tests/sandbox/docker-compose.yml logs --tail 200 || true
